name: QC

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qc:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: just install

      # Offline, deterministic gate: structural + ontology terms + FDA snippets,
      # all served from the committed caches (no ontology download, no external calls).
      - name: QC (offline)
        run: uv run just test

      - name: Lint
        run: uv run just lint
