name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (leave empty for auto-generated date tag)'
        required: false
        type: string
  schedule:
    # Monthly on the 1st at midnight UTC
    - cron: '0 0 1 * *'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: just install

      # Enrich nodes from canonical sources -> KGX jsonl -> validated release-metadata.yaml.
      # The KGX is produced here as a release artifact; it is NOT committed to the repo.
      - name: Build release
        run: uv run just release

      - name: Generate release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: |
            Automated release of the FDA biologics ingest.

            Edges: drug→disease (approved indications) and drug→gene (molecular targets),
            grounded to NCIT/MONDO/HGNC. Artifacts: KGX jsonl nodes/edges and the
            kozahub-schema-validated `release-metadata.yaml`.
          files: |
            output/*
