    evidence:
      - reference: FDA:a0a046c1-056d-45a9-bfd9-13b47c24f257
        snippet: "REMICADE is a tumor necrosis factor (TNF) blocker indicated for:"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "The label states the mechanism is TNF blockade, i.e. infliximab causes decreased TNF activity."
    needs_review: false
