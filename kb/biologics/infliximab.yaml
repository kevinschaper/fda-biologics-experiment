biologic:
  name: infliximab
  id: NCIT:C1789
  matched_label: Infliximab
  synonyms: [Remicade]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: Crohn's disease, id: MONDO:0005011, matched_label: Crohn disease}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:a0a046c1-056d-45a9-bfd9-13b47c24f257
        snippet: "reducing signs and symptoms and inducing and maintaining clinical remission in adult patients with moderately to severely active Crohn's disease (CD) who have had an inadequate response to conventional therapy."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names moderately to severely active Crohn's disease as an approved treatment population, asserting the drug→disease edge on an existing active condition."
      - reference: PMID:9321530
        reference_title: "A short-term study of chimeric monoclonal antibody cA2 to tumor necrosis factor alpha for Crohn's disease. Crohn's Disease cA2 Study Group."
        snippet: "At 12 weeks, 41 percent of the cA2-treated patients (34 of 83) had had a clinical response, as compared with 12 percent of the patients in the placebo group (3 of 25)"
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal placebo-controlled trial of cA2 (the chimeric anti-TNF antibody later named infliximab) showing clinical response in Crohn's disease, corroborating the indication."
    needs_review: false
  - predicate: biolink:ameliorates_condition
    object: {name: rheumatoid arthritis, id: MONDO:0008383, matched_label: rheumatoid arthritis}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:a0a046c1-056d-45a9-bfd9-13b47c24f257
        snippet: "REMICADE, in combination with methotrexate, is indicated for reducing signs and symptoms, inhibiting the progression of structural damage, and improving physical function in adult patients with moderately to severely active rheumatoid arthritis (RA)."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE lists moderately to severely active rheumatoid arthritis (in combination with methotrexate) as an approved treatment population; the edge remains drug→disease."
    needs_review: false
targets:
