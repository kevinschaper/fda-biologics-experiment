biologic:
  name: sacituzumab govitecan
  id: NCIT:C102783
  matched_label: Sacituzumab Govitecan
  synonyms: [Trodelvy]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: triple-negative breast cancer, id: MONDO:0005494, matched_label: triple-negative breast carcinoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:57a597d2-03f0-472e-b148-016d7169169d
        snippet: "TRODELVY is indicated for the treatment of adult patients with unresectable locally advanced or metastatic triple-negative breast cancer (mTNBC) who have received two or more prior systemic therapies, at least one of them for metastatic disease."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names unresectable locally advanced or metastatic triple-negative breast cancer as an approved treatment population; stripping the stage/setting qualifiers leaves triple-negative breast cancer, which grounds to MONDO:0005494 (triple-negative breast carcinoma)."
      - reference: PMID:33882206
        reference_title: "Sacituzumab Govitecan in Metastatic Triple-Negative Breast Cancer."
        snippet: "Progression-free and overall survival were significantly longer with sacituzumab govitecan than with single-agent chemotherapy among patients with metastatic triple-negative breast cancer."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCT (ASCENT) demonstrating that sacituzumab govitecan significantly prolongs progression-free and overall survival versus chemotherapy in metastatic triple-negative breast cancer, corroborating the indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: Trop-2, id: HGNC:11530, matched_label: TACSTD2}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:57a597d2-03f0-472e-b148-016d7169169d
        snippet: "Pharmacology data suggest that sacituzumab govitecan-hziy binds to Trop-2-expressing cancer cells and is internalized with the subsequent release of SN-38 via hydrolysis of the linker."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states this Trop-2-directed antibody-drug conjugate binds Trop-2-expressing cancer cells and is internalized, delivering SN-38 that drives apoptosis and cell death; the directed, internalizing antibody depletes Trop-2-bearing cells → decreased abundance. Trop-2 is the protein encoded by the HGNC gene TACSTD2 (HGNC:11530)."
    needs_review: false
    candidates: []
