biologic:
  name: etanercept
  id: NCIT:C2381
  matched_label: Etanercept
  synonyms: [Enbrel]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: rheumatoid arthritis, id: MONDO:0008383, matched_label: rheumatoid arthritis}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:a002b40c-097d-47a5-957f-7a7b1807af7f
        snippet: "Enbrel is indicated for reducing signs and symptoms, inducing major clinical response, inhibiting the progression of structural damage, and improving physical function in patients with moderately to severely active rheumatoid arthritis (RA)."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names moderately to severely active rheumatoid arthritis as an approved treatment population, asserting the drug→disease edge on an existing active condition."
    needs_review: false
  - predicate: biolink:ameliorates_condition
    object: {name: plaque psoriasis, id: MONDO:0005083, matched_label: psoriasis}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:a002b40c-097d-47a5-957f-7a7b1807af7f
        snippet: "Enbrel is indicated for the treatment of patients 4 years or older with chronic moderate to severe plaque psoriasis (PsO) who are candidates for systemic therapy or phototherapy."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE lists chronic moderate to severe plaque psoriasis as an approved indication; severity qualifiers are stripped for grounding to psoriasis (MONDO:0005083), with the verbatim phrase retained in the snippet."
    needs_review: false
targets:
  - predicate: biolink:affects
    object: {name: TNF, id: HGNC:11892, matched_label: TNF}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: activity
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:a002b40c-097d-47a5-957f-7a7b1807af7f
        snippet: "Etanercept inhibits binding of TNF-α and TNF-β (lymphotoxin alpha [LT-α]) to cell surface TNFRs, rendering TNF biologically inactive."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states etanercept inhibits TNF binding and renders TNF biologically inactive, i.e. it causes decreased TNF activity."
    needs_review: false
