biologic:
  name: glofitamab
  id: NCIT:C148486
  matched_label: Glofitamab
  synonyms: [Columvi]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: diffuse large B-cell lymphoma, id: MONDO:0018905, matched_label: diffuse large B-cell lymphoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:3516e753-f064-4d30-9bd5-e3f2e143f75d
        snippet: "COLUMVI is a bispecific CD20-directed CD3 T-cell engager indicated for the treatment of adult patients with relapsed or refractory diffuse large B-cell lymphoma, not otherwise specified (DLBCL, NOS) or large B-cell lymphoma (LBCL) arising from follicular lymphoma, after two or more lines of systemic therapy."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names relapsed or refractory diffuse large B-cell lymphoma as an approved treatment population, asserting the drug→disease edge. DLBCL grounds exactly to MONDO:0018905."
      - reference: PMID:36507690
        reference_title: "Glofitamab for Relapsed or Refractory Diffuse Large B-Cell Lymphoma."
        snippet: "Glofitamab therapy was effective for DLBCL."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 2 trial demonstrating efficacy of fixed-duration glofitamab monotherapy (39% complete response) in relapsed or refractory DLBCL after two or more prior lines, corroborating the indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: CD20, id: HGNC:7315, matched_label: MS4A1}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:3516e753-f064-4d30-9bd5-e3f2e143f75d
        snippet: "Glofitamab-gxbm is a bispecific antibody that binds to CD20 expressed on the surface of B cells, and to CD3 receptor expressed on the surface of T cells. Glofitamab-gxbm causes T-cell activation and proliferation, secretion of cytokines, and the lysis of CD20-expressing B cells."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MoA states glofitamab is a CD20/CD3 bispecific antibody that binds CD20 on B cells and causes lysis of CD20-expressing B cells, depleting the CD20-bearing tumor-antigen population → decreased abundance of CD20. CD20 is the prior symbol for the HGNC gene MS4A1 (HGNC:7315)."
    needs_review: false
    candidates: []
