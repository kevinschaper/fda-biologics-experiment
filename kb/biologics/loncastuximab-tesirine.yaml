biologic:
  name: loncastuximab tesirine
  id: NCIT:C125549
  matched_label: Loncastuximab Tesirine
  synonyms: [Zynlonta]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: large B-cell lymphoma, id: MONDO:0968974, matched_label: large B-cell lymphoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:af54af12-3edf-4301-8bc5-0446bc813c1d
        snippet: "ZYNLONTA is indicated for the treatment of adult patients with relapsed or refractory large B-cell lymphoma after two or more lines of systemic therapy, including diffuse large B-cell lymphoma (DLBCL) not otherwise specified, DLBCL arising from low-grade lymphoma, and high-grade B-cell lymphoma."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names relapsed or refractory large B-cell lymphoma as the approved treatment population; stripping the relapsed/refractory and line-of-therapy qualifiers leaves large B-cell lymphoma, which grounds to MONDO:0968974."
      - reference: PMID:33989558
        reference_title: "Loncastuximab tesirine in relapsed or refractory diffuse large B-cell lymphoma (LOTIS-2): a multicentre, open-label, single-arm, phase 2 trial."
        snippet: "Loncastuximab tesirine has substantial single-agent antitumour activity and produces durable responses with an acceptable safety profile, potentially offering a new therapeutic option for heavily pretreated patients with relapsed or refractory DLBCL."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal LOTIS-2 phase 2 trial demonstrating substantial single-agent antitumour activity and durable responses of loncastuximab tesirine in relapsed or refractory large B-cell lymphoma (DLBCL), corroborating the approved indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: CD19, id: HGNC:1633, matched_label: CD19}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:af54af12-3edf-4301-8bc5-0446bc813c1d
        snippet: "Loncastuximab tesirine-lpyl is an antibody-drug conjugate (ADC) targeting CD19. The monoclonal IgG1 kappa antibody component binds to human CD19, a transmembrane protein expressed on the surface of cells of B-lineage origin."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states this is a CD19-directed antibody-drug conjugate whose antibody binds human CD19 on B-lineage cells; after internalization it releases a PBD-dimer alkylator that kills the bound cell, so the internalizing ADC depletes CD19-bearing cells -> decreased abundance. CD19 is the HGNC gene HGNC:1633."
    needs_review: false
    candidates: []
