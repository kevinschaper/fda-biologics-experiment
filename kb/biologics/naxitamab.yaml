biologic:
  name: naxitamab
  id: NCIT:C123428
  matched_label: Naxitamab
  synonyms: [Danyelza]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: neuroblastoma, id: MONDO:0005072, matched_label: neuroblastoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:29a80c6b-8bad-4650-8c7f-f18490c868ec
        snippet: "DANYELZA is indicated, in combination with granulocyte-macrophage colony-stimulating factor (GM-CSF), for the treatment of pediatric patients 1 year of age and older and adult patients with relapsed or refractory high-risk neuroblastoma in the bone or bone marrow who have demonstrated a partial response, minor response, or stable disease to prior therapy."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names relapsed or refractory high-risk neuroblastoma in the bone or bone marrow as the approved treatment population (in combination with GM-CSF); stripping the relapsed/refractory, high-risk, and site qualifiers leaves neuroblastoma, which grounds to MONDO:0005072."
      - reference: PMID:39952926
        reference_title: "The anti-GD2 monoclonal antibody naxitamab plus GM-CSF for relapsed or refractory high-risk neuroblastoma: a phase 2 clinical trial."
        snippet: "Overall response rate (ORR) was 50% (95% CI: 36-64%), and CR and PR were observed in 38% and 12%, respectively. With the 95% CI lower limit for ORR exceeding 20%, the primary endpoint of overall response was met."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 2 trial (NCT03363373) of naxitamab plus GM-CSF in relapsed/refractory high-risk neuroblastoma met its primary overall-response endpoint (ORR 50%), corroborating the approved indication on which accelerated approval was based."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: GD2 ganglioside}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:29a80c6b-8bad-4650-8c7f-f18490c868ec
        snippet: "Naxitamab-gqgk binds to the glycolipid GD2."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states naxitamab binds the glycolipid GD2 (a disialoganglioside overexpressed on neuroblastoma) and induces lysis of GD2-expressing cells via CDC and ADCC, depleting GD2-bearing cells -> decreased abundance. GD2 is a glycolipid, not a human gene product, so it has no HGNC id; flagged needs_review with no candidates."
    needs_review: true
    candidates: []
