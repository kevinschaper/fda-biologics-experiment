    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:c77a9664-e3bb-4023-b400-127aa53bca2b
        snippet: "adults and pediatric patients 2 years of age and older with moderately to severely active Crohn's disease"
        supports: SUPPORT
