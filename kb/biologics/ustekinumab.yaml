targets:
  - predicate: biolink:affects
    object: {name: IL-12/IL-23 p40 subunit, id: HGNC:5970, matched_label: IL12B}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: activity
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:c77a9664-e3bb-4023-b400-127aa53bca2b
        snippet: "binds with specificity to the p40 protein subunit used by both the IL-12 and IL-23 cytokines"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MoA states ustekinumab binds the shared p40 subunit of IL-12 and IL-23 and disrupts their signaling, i.e. causes decreased activity of p40. The p40 subunit is encoded by IL12B (HGNC:5970)."
    needs_review: false
