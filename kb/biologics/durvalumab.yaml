    object: {name: non-small cell lung cancer, id: MONDO:0005233, matched_label: non-small cell lung carcinoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:8baba4ea-2855-42fa-9bd9-5a7548d4cec3
        snippet: "as a single agent, for the treatment of adult patients with unresectable, Stage III NSCLC whose disease has not progressed following concurrent platinum-based chemotherapy and radiation therapy."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names unresectable Stage III non-small cell lung cancer as an approved single-agent treatment population, asserting the drug→disease edge; stage qualifiers are stripped for grounding to non-small cell lung cancer (MONDO:0005233)."
      - reference: PMID:42291345
        reference_title: "Real-world outcomes of consolidative durvalumab after concurrent chemoradiotherapy in stage III non-small cell lung cancer: the prognostic role of clinical frailty in the post-PACIFIC era."
        snippet: "In this real-world cohort, consolidative durvalumab was independently associated with improved OS, including in patients with PD-L1 expression ≥1%."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Real-world cohort of unresectable stage III NSCLC in which consolidative durvalumab after chemoradiotherapy was independently associated with improved overall survival, corroborating the durvalumab→non-small cell lung cancer edge."
