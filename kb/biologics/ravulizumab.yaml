targets:
  - predicate: biolink:affects
    object: {name: C5, id: HGNC:1331, matched_label: C5}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: activity
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:a9a590d9-0217-43c7-908d-e62a71279791
        snippet: "Ravulizumab-cwvz is a terminal complement inhibitor that specifically binds to the complement protein C5 with high affinity, thereby inhibiting its cleavage to C5a (the proinflammatory anaphylatoxin) and C5b (the initiating subunit of the membrane attack complex [MAC or C5b-9]) thus preventing MAC formation."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MoA states ravulizumab binds complement protein C5 and inhibits its cleavage to C5a and C5b, blocking terminal complement activation → decreased C5 activity. C5 is the HGNC gene symbol (HGNC:1331)."
    needs_review: false
