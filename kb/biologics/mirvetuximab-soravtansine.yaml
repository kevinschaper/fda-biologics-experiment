biologic:
  name: mirvetuximab soravtansine
  id: NCIT:C102566
  matched_label: Mirvetuximab Soravtansine
  synonyms: [Elahere]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: epithelial ovarian cancer, id: MONDO:0005140, matched_label: ovarian carcinoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:00c424b5-6ccd-48ab-9e88-1986451120e2
        snippet: "is indicated for the treatment of adult patients with folate receptor-alpha (FRα) positive, platinum-resistant epithelial ovarian, fallopian tube, or primary peritoneal cancer, who have received one to three prior systemic treatment regimens."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names FRalpha-positive platinum-resistant epithelial ovarian (and fallopian tube/primary peritoneal) cancer as an approved treatment population; stripping the FRalpha/platinum-resistant qualifiers leaves epithelial ovarian cancer, which grounds to MONDO:0005140 (ovarian carcinoma)."
      - reference: PMID:38055253
        reference_title: "Mirvetuximab Soravtansine in FRα-Positive, Platinum-Resistant Ovarian Cancer."
        snippet: "Among participants with platinum-resistant, FRα-positive ovarian cancer, treatment with MIRV showed a significant benefit over chemotherapy with respect to progression-free and overall survival and objective response."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCT (MIRASOL) showing mirvetuximab soravtansine (MIRV) provides significant benefit over chemotherapy in progression-free survival, overall survival, and objective response in platinum-resistant, FRalpha-positive ovarian cancer, corroborating the indication."
    needs_review: false
    candidates: []
  - predicate: biolink:ameliorates_condition
    object: {name: fallopian tube cancer, id: MONDO:0002158, matched_label: fallopian tube cancer}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:00c424b5-6ccd-48ab-9e88-1986451120e2
        snippet: "is indicated for the treatment of adult patients with folate receptor-alpha (FRα) positive, platinum-resistant epithelial ovarian, fallopian tube, or primary peritoneal cancer, who have received one to three prior systemic treatment regimens."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "The same INDICATIONS AND USAGE sentence names FRalpha-positive platinum-resistant fallopian tube cancer as an approved treatment population; stripping the FRalpha/platinum-resistant qualifiers leaves fallopian tube cancer, which grounds to MONDO:0002158."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: folate receptor alpha, id: HGNC:3791, matched_label: FOLR1}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:00c424b5-6ccd-48ab-9e88-1986451120e2
        snippet: "Mirvetuximab soravtansine-gynx is an antibody-drug conjugate (ADC). The antibody is a chimeric IgG1 directed against folate receptor alpha (FRα). The small molecule, DM4, is a microtubule inhibitor attached to the antibody via a cleavable linker. Upon binding to FRα, mirvetuximab soravtansine-gynx is internalized followed by intracellular release of DM4 via proteolytic cleavage. DM4 disrupts the microtubule network within the cell, resulting in cell cycle arrest and apoptotic cell death."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states this folate receptor alpha (FRalpha)-directed antibody-drug conjugate binds FRalpha and is internalized, releasing DM4 that disrupts microtubules and causes apoptosis; the directed, internalizing antibody depletes FRalpha-bearing cells -> decreased abundance. Folate receptor alpha is encoded by the HGNC gene FOLR1 (HGNC:3791)."
    needs_review: false
    candidates: []
