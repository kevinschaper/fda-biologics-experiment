indications:
  - predicate: biolink:ameliorates_condition
    object: {name: plaque psoriasis, id: MONDO:0005083, matched_label: psoriasis}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:1a550c33-456a-4833-814e-8591aea7c688
        snippet: "indicated for the treatment of moderate to severe plaque psoriasis in adult patients who are candidates for systemic therapy or phototherapy and have failed to respond or have lost response to other systemic therapies."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names moderate to severe plaque psoriasis as an approved treatment population, asserting the drug→disease edge. No exact MONDO term for 'plaque psoriasis' was found by grounding; grounded to the parent concept psoriasis (MONDO:0005083) and flagged for review."
      - reference: PMID:26422722
        reference_title: "Phase 3 Studies Comparing Brodalumab with Ustekinumab in Psoriasis."
        snippet: "At week 12, the PASI 75 response rates were higher with brodalumab at the 210-mg and 140-mg doses than with placebo"
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCT (AMAGINE-2/3) showing brodalumab achieves higher PASI 75 response rates than placebo in moderate-to-severe plaque psoriasis, corroborating the indication."
