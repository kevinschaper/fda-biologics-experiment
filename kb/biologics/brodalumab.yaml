        snippet: "selectively binds to human IL-17RA and inhibits its interactions with cytokines IL-17A, IL-17F, IL-17C, IL-17A/F heterodimer, and IL-25"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MoA states brodalumab binds human IL-17RA and inhibits its cytokine interactions, i.e. causes decreased activity of the IL-17 receptor A, which is encoded by IL17RA (HGNC:5985)."
