targets:
  - predicate: biolink:affects
    object: {name: VEGF-A, id: HGNC:12680, matched_label: VEGFA}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: activity
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:5d1dc1fa-a2d3-46ed-9e9a-c1a036590d3d
        snippet: "Brolucizumab binds to the three major isoforms of VEGF-A (e.g., VEGF 110 , VEGF 121 , and VEGF 165 ), thereby preventing interaction with receptors VEGFR-1 and VEGFR-2."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states brolucizumab is a VEGF inhibitor that binds VEGF-A and prevents its interaction with VEGFR-1/VEGFR-2, i.e. causes decreased VEGF-A activity. VEGF-A grounds to the HGNC gene VEGFA (HGNC:12680)."
    needs_review: false
