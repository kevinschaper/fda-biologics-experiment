biologic:
  name: brolucizumab
  id: NCIT:C169818
  matched_label: Brolucizumab
  synonyms: [Beovu]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: neovascular (wet) age-related macular degeneration, id: MONDO:0005417, matched_label: wet macular degeneration}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:5d1dc1fa-a2d3-46ed-9e9a-c1a036590d3d
        snippet: "BEOVU is a human vascular endothelial growth factor (VEGF) inhibitor indicated for the treatment of: Neovascular (Wet) Age-Related Macular Degeneration (AMD)"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names Neovascular (Wet) Age-Related Macular Degeneration as an approved treatment indication; neovascular (wet) AMD grounds to MONDO:0005417 (wet macular degeneration)."
      - reference: PMID:30986442
        reference_title: "HAWK and HARRIER: Phase 3, Multicenter, Randomized, Double-Masked Trials of Brolucizumab for Neovascular Age-Related Macular Degeneration."
        snippet: "Brolucizumab was noninferior to aflibercept in visual function at Week 48, and >50% of brolucizumab 6 mg-treated eyes were maintained on q12w dosing interval through Week 48."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCTs (HAWK and HARRIER) demonstrating brolucizumab is noninferior to aflibercept in visual function in neovascular (wet) AMD, corroborating the indication."
    needs_review: false
