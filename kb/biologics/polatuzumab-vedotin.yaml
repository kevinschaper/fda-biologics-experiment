biologic:
  name: polatuzumab vedotin
  id: NCIT:C104153
  matched_label: Polatuzumab Vedotin
  synonyms: [Polivy]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: diffuse large B-cell lymphoma, id: MONDO:0018905, matched_label: diffuse large B-cell lymphoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:20a16ab2-f338-4abb-9dcd-254bd949a2bc
        snippet: "POLIVY in combination with a rituximab product, cyclophosphamide, doxorubicin, and prednisone (R-CHP) is indicated for the treatment of adult patients who have previously untreated diffuse large B-cell lymphoma (DLBCL), not otherwise specified (NOS) or high-grade B-cell lymphoma (HGBL) and who have an International Prognostic Index score of 2 or greater."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names previously untreated diffuse large B-cell lymphoma as an approved treatment population (in combination with R-CHP); the disease grounds to MONDO:0018905 (diffuse large B-cell lymphoma)."
      - reference: PMID:34904799
        reference_title: "Polatuzumab Vedotin in Previously Untreated Diffuse Large B-Cell Lymphoma."
        snippet: "Among patients with previously untreated intermediate-risk or high-risk DLBCL, the risk of disease progression, relapse, or death was lower among those who received pola-R-CHP than among those who received R-CHOP."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCT (POLARIX) demonstrating that pola-R-CHP lowers the risk of disease progression, relapse, or death versus R-CHOP in previously untreated DLBCL, corroborating the indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: CD79b, id: HGNC:1699, matched_label: CD79B}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:20a16ab2-f338-4abb-9dcd-254bd949a2bc
        snippet: "The monoclonal antibody binds to CD79b, a B-cell specific surface protein, which is a component of the B-cell receptor. Upon binding CD79b, polatuzumab vedotin-piiq is internalized, and the linker is cleaved by lysosomal proteases to enable intracellular delivery of MMAE."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states this CD79b-directed antibody-drug conjugate binds CD79b on B cells and is internalized, delivering MMAE that kills dividing cells via apoptosis; the directed, internalizing antibody depletes CD79b-bearing cells → decreased abundance. CD79b is the HGNC gene CD79B (HGNC:1699)."
    needs_review: false
    candidates: []
