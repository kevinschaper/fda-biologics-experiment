biologic:
  name: tafasitamab
  id: NCIT:C95768
  matched_label: Tafasitamab
  synonyms: [Monjuvi]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: diffuse large B-cell lymphoma, id: MONDO:0018905, matched_label: diffuse large B-cell lymphoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:ec13ac6b-bfde-4e84-907a-83bd69584d95
        snippet: "MONJUVI is a CD19-directed cytolytic antibody indicated in combination with lenalidomide for the treatment of adult patients with relapsed or refractory diffuse large B-cell lymphoma (DLBCL) not otherwise specified, including DLBCL arising from low grade lymphoma, and who are not eligible for autologous stem cell transplant (ASCT)."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names relapsed or refractory diffuse large B-cell lymphoma as an approved treatment population (in combination with lenalidomide), asserting the drug→disease edge. DLBCL grounds exactly to MONDO:0018905."
      - reference: PMID:32511983
        reference_title: "Tafasitamab plus lenalidomide in relapsed or refractory diffuse large B-cell lymphoma (L-MIND): a multicentre, prospective, single-arm, phase 2 study."
        snippet: "Tafasitamab in combination with lenalidomide was well tolerated and resulted in a high proportion of patients with relapsed or refractory diffuse large B-cell lymphoma ineligible for autologous stem-cell transplantation having a complete response, and might represent a new therapeutic option in this setting."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal single-arm phase 2 study (L-MIND) demonstrating tafasitamab plus lenalidomide yields a high complete-response rate in transplant-ineligible relapsed or refractory DLBCL, corroborating the indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: CD19, id: HGNC:1633, matched_label: CD19}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:ec13ac6b-bfde-4e84-907a-83bd69584d95
        snippet: "Tafasitamab-cxix is an Fc-modified monoclonal antibody that binds to CD19 antigen expressed on the surface of pre-B and mature B lymphocytes and on several B-cell malignancies, including diffuse large B-cell lymphoma (DLBCL). Upon binding to CD19, tafasitamab-cxix mediates B-cell lysis through apoptosis and immune effector mechanisms, including antibody-dependent cellular cytotoxicity (ADCC) and antibody-dependent cellular phagocytosis (ADCP)."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MoA states tafasitamab is a CD19-directed cytolytic antibody that binds CD19 on B lymphocytes/malignancies and mediates B-cell lysis via apoptosis, ADCC and ADCP, depleting the CD19-bearing tumor-antigen population → decreased abundance of CD19. CD19 is the HGNC gene symbol (HGNC:1633)."
    needs_review: false
    candidates: []
