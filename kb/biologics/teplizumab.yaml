biologic:
  name: teplizumab
  id: NCIT:C88647
  matched_label: Teplizumab
  synonyms: [Tzield]
indications:
  - predicate: biolink:preventative_for_condition
    object: {name: type 1 diabetes, id: MONDO:0005147, matched_label: type 1 diabetes mellitus}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:e8a39a5f-139c-4510-9777-71cbb00138fa
        snippet: "Delay the onset of Stage 3 type 1 diabetes (T1D) in adult and pediatric patients 1 year of age and older with Stage 2 T1D."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE states TZIELD is indicated to delay the onset of Stage 3 (clinical) type 1 diabetes in at-risk Stage 2 patients; delaying onset is risk-reduction/prophylaxis, so preventative_for_condition. Type 1 diabetes grounds to MONDO:0005147 (type 1 diabetes mellitus)."
      - reference: PMID:31180194
        reference_title: "An Anti-CD3 Antibody, Teplizumab, in Relatives at Risk for Type 1 Diabetes."
        snippet: "Teplizumab delayed progression to clinical type 1 diabetes in high-risk participants."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 2 RCT (TN-10) demonstrating that teplizumab delays progression to clinical (Stage 3) type 1 diabetes in high-risk relatives, the basis for the delay-of-onset indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: CD3}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:e8a39a5f-139c-4510-9777-71cbb00138fa
        snippet: "Teplizumab-mzwv binds to CD3 (a cell surface antigen present on T lymphocytes)"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states teplizumab binds CD3 on T lymphocytes, and Pharmacodynamics describes internalization of the teplizumab/CD3 complex from the T-cell surface (→ decreased surface abundance). The label names 'CD3', which is the multi-subunit T-cell receptor CD3 complex, not a single gene product; CD3D (HGNC:1673), CD3E (HGNC:1674) and CD3G (HGNC:1675) all match equally, so a single confident HGNC grounding is not possible — needs_review with the complex members retained as candidates."
    needs_review: true
    candidates:
      - {curie: HGNC:1673, label: CD3D, score: 1.0, match_type: search, source: genenames}
      - {curie: HGNC:1674, label: CD3E, score: 1.0, match_type: search, source: genenames}
      - {curie: HGNC:1675, label: CD3G, score: 1.0, match_type: search, source: genenames}
