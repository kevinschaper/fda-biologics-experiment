indications:
  - predicate: biolink:ameliorates_condition
    object: {name: neovascular (wet) age-related macular degeneration, id: MONDO:0005150, matched_label: age-related macular degeneration}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:f96cfd69-da34-41ee-90a9-610a4655cd1c
        snippet: "EYLEA is a vascular endothelial growth factor (VEGF) inhibitor indicated for the treatment of patients with: Neovascular (Wet) Age-Related Macular Degeneration (AMD)"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names Neovascular (Wet) Age-Related Macular Degeneration as an approved treatment population; stripping the neovascular (wet) qualifier leaves age-related macular degeneration (MONDO:0005150), asserting the drug→disease edge on an existing active condition."
      - reference: PMID:23084240
        reference_title: "Intravitreal aflibercept (VEGF trap-eye) in wet age-related macular degeneration."
        snippet: "These studies demonstrate that aflibercept is an effective treatment for AMD"
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Integrated analysis of the pivotal phase 3 VIEW 1 and VIEW 2 randomized trials showing intravitreal aflibercept is non-inferior to ranibizumab and an effective treatment for neovascular (wet) AMD, corroborating the indication."
    needs_review: false
