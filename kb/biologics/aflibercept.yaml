targets:
  - predicate: biolink:affects
    object: {name: VEGF-A, id: HGNC:12680, matched_label: VEGFA}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: activity
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:f96cfd69-da34-41ee-90a9-610a4655cd1c
        snippet: "Aflibercept acts as a soluble decoy receptor that binds VEGF-A and PlGF, and thereby can inhibit the binding and activation of these cognate VEGF receptors."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states aflibercept is a soluble decoy receptor (VEGF trap) that binds VEGF-A and inhibits activation of its cognate receptors → decreased VEGF-A activity. VEGF-A grounds to the HGNC gene VEGFA."
    needs_review: false
