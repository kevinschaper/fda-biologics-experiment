biologic:
  name: enfortumab vedotin
  id: NCIT:C114500
  matched_label: Enfortumab Vedotin
  synonyms: [Padcev]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: urothelial cancer, id: MONDO:0040679, matched_label: urothelial carcinoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:b5631d3e-4604-4363-8f20-11dfc5a4a8ed
        snippet: "PADCEV ® , in combination with pembrolizumab or pembrolizumab and berahyaluronidase alfa-pmph, is indicated for the treatment of adult patients with locally advanced or metastatic urothelial cancer (mUC)."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names locally advanced or metastatic urothelial cancer as an approved treatment population (here in combination with pembrolizumab); stripping the stage qualifiers leaves urothelial cancer, which grounds to MONDO:0040679 (urothelial carcinoma)."
      - reference: PMID:38446675
        reference_title: "Enfortumab Vedotin and Pembrolizumab in Untreated Advanced Urothelial Cancer."
        snippet: "Treatment with enfortumab vedotin and pembrolizumab resulted in significantly better outcomes than chemotherapy in patients with untreated locally advanced or metastatic urothelial carcinoma, with a safety profile consistent with that in previous reports."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCT (EV-302) demonstrating that enfortumab vedotin plus pembrolizumab significantly improves outcomes versus chemotherapy in untreated locally advanced or metastatic urothelial cancer, corroborating the indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: Nectin-4, id: HGNC:19688, matched_label: NECTIN4}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:b5631d3e-4604-4363-8f20-11dfc5a4a8ed
        snippet: "Nonclinical data suggest that the anticancer activity of enfortumab vedotin-ejfv is due to the binding of the ADC to Nectin-4-expressing cells, followed by internalization of the ADC-Nectin-4 complex, and the release of MMAE via proteolytic cleavage."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states this Nectin-4-directed antibody-drug conjugate binds Nectin-4-expressing cells and is internalized as the ADC-Nectin-4 complex, delivering MMAE that induces apoptosis; the directed, internalizing antibody depletes Nectin-4-bearing cells → decreased abundance. Nectin-4 is encoded by the HGNC gene NECTIN4 (HGNC:19688)."
    needs_review: false
    candidates: []
