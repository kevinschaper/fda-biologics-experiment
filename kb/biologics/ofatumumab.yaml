biologic:
  name: ofatumumab
  id: NCIT:C66952
  matched_label: Ofatumumab
  synonyms: [Kesimpta]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: relapsing forms of multiple sclerosis, id: MONDO:0005301, matched_label: multiple sclerosis}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:6a8a3f53-2062-48ff-9dbe-b939df133ca3
        snippet: "KESIMPTA is indicated for the treatment of relapsing forms of multiple sclerosis (MS), to include clinically isolated syndrome, relapsing-remitting disease, and active secondary progressive disease, in adults."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names relapsing forms of multiple sclerosis as an approved treatment population, asserting the drug→disease edge. Grounded to the multiple sclerosis genus (MONDO:0005301)."
      - reference: PMID:32757523
        reference_title: "Ofatumumab versus Teriflunomide in Multiple Sclerosis."
        snippet: "Among patients with multiple sclerosis, ofatumumab was associated with lower annualized relapse rates than teriflunomide."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCTs (ASCLEPIOS I and II) demonstrating ofatumumab efficacy versus teriflunomide in relapsing multiple sclerosis, corroborating the indication."
    needs_review: false
targets:
  - predicate: biolink:affects
    object: {name: CD20, id: HGNC:7315, matched_label: MS4A1}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:6a8a3f53-2062-48ff-9dbe-b939df133ca3
        snippet: "is presumed to involve binding to CD20, a cell surface antigen present on pre-B and mature B lymphocytes. Following cell surface binding to B lymphocytes, ofatumumab results in antibody-dependent cellular cytolysis and complement-mediated lysis."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MoA states ofatumumab is a CD20-directed cytolytic antibody that binds CD20 and mediates antibody-dependent cellular cytolysis and complement-mediated lysis, depleting CD20-bearing B cells → decreased abundance. CD20 is the prior symbol for the HGNC gene MS4A1."
    needs_review: false
