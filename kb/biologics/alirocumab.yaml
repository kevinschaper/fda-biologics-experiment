    evidence:
      - reference: FDA:446f6b5c-0dd4-44ff-9bc2-c2b41f2806b4
        snippet: "adults with homozygous familial hypercholesterolemia (HoFH)."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names homozygous familial hypercholesterolemia (HoFH) as an approved treatment population (adjunct to diet/exercise to reduce LDL-C), asserting the drug->disease edge."
      - reference: PMID:32646561
        reference_title: "Efficacy and Safety of Alirocumab in Adults With Homozygous Familial Hypercholesterolemia: The ODYSSEY HoFH Trial."
        snippet: "In the largest randomized controlled interventional trial in HoFH patients to date, alirocumab resulted in significant and clinically meaningful reductions in LDL-C at week 12."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal randomized, double-blind, placebo-controlled phase 3 trial (ODYSSEY HoFH) demonstrating alirocumab significantly reduces LDL-C in adults with homozygous familial hypercholesterolemia, corroborating the indication."
