        reference_title: "Tezepelumab in Adults and Adolescents with Severe, Uncontrolled Asthma."
        snippet: "Patients with severe, uncontrolled asthma who received tezepelumab had fewer exacerbations and better lung function, asthma control, and health-related quality of life than those who received placebo."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCT (NAVIGATOR) showing tezepelumab reduces exacerbations and improves lung function and asthma control in severe asthma, corroborating the indication."
