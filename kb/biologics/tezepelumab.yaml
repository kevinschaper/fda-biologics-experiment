      - reference: FDA:60f0aa03-ad25-4d48-80ce-7fcfa76f325f
        snippet: "TEZSPIRE is indicated for the add-on maintenance treatment of adult and pediatric patients aged 12 years and older with severe asthma."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names severe asthma as an approved add-on maintenance treatment population; stripping the severity qualifier leaves asthma, asserting the drug→disease edge."
