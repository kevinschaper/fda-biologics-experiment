biologic:
  name: lecanemab
  id: NCIT:C175105
  matched_label: Lecanemab
  synonyms: [Leqembi]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: Alzheimer's disease, id: MONDO:0004975, matched_label: Alzheimer disease}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:9d1ff786-e577-410a-a273-c4d7d0e4e975
        snippet: "LEQEMBI is indicated for the treatment of Alzheimer’s disease."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names Alzheimer's disease as the approved treatment indication (initiated in mild cognitive impairment / mild dementia stage); it grounds to MONDO:0004975 (Alzheimer disease)."
      - reference: PMID:36449413
        reference_title: "Lecanemab in Early Alzheimer's Disease."
        snippet: "Lecanemab reduced markers of amyloid in early Alzheimer's disease and resulted in moderately less decline on measures of cognition and function than placebo at 18 months but was associated with adverse events."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCT (Clarity AD) demonstrating lecanemab reduces brain amyloid and slows cognitive/functional decline versus placebo in early Alzheimer's disease, corroborating the indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: amyloid beta, id: HGNC:620, matched_label: APP}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:9d1ff786-e577-410a-a273-c4d7d0e4e975
        snippet: "Lecanemab-irmb is a humanized immunoglobulin gamma 1 (IgG1) monoclonal antibody directed against aggregated soluble and insoluble forms of amyloid beta."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states lecanemab is directed against aggregated forms of amyloid beta. The amyloid beta peptide is a cleavage product of the amyloid precursor protein, encoded by the gene APP (HGNC:620); the gene stands in for its product per the gene-or-gene-product convention."
      - reference: FDA:9d1ff786-e577-410a-a273-c4d7d0e4e975
        snippet: "LEQEMBI reduces amyloid beta plaques"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states LEQEMBI reduces amyloid beta plaques, i.e. causes decreased abundance of amyloid beta (APP gene product)."
    needs_review: true
    candidates:
