biologic:
  name: brentuximab vedotin
  id: NCIT:C66944
  matched_label: Brentuximab Vedotin
  synonyms: [Adcetris]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: classical Hodgkin lymphoma, id: MONDO:0009348, matched_label: classic Hodgkin lymphoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:3904f8dd-1aef-3490-e48f-bd55f32ed67f
        snippet: "Adult patients with previously untreated Stage III or IV classical Hodgkin lymphoma (cHL), in combination with doxorubicin, vinblastine, and dacarbazine"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names previously untreated Stage III or IV classical Hodgkin lymphoma as an approved treatment population (in combination chemotherapy); stripping the stage qualifiers leaves classical Hodgkin lymphoma, which grounds to MONDO:0009348 (classic Hodgkin lymphoma)."
      - reference: PMID:29224502
        reference_title: "Brentuximab Vedotin with Chemotherapy for Stage III or IV Hodgkin's Lymphoma."
        snippet: "A+AVD had superior efficacy to ABVD in the treatment of patients with advanced-stage Hodgkin's lymphoma, with a 4.9 percentage-point lower combined risk of progression, death, or noncomplete response and use of subsequent anticancer therapy at 2 years."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCT (ECHELON-1) showing brentuximab vedotin plus AVD (A+AVD) is superior to ABVD in previously untreated advanced-stage (Stage III/IV) classical Hodgkin lymphoma, corroborating the indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: CD30, id: HGNC:11923, matched_label: TNFRSF8}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:3904f8dd-1aef-3490-e48f-bd55f32ed67f
        snippet: "The antibody is a chimeric IgG1 directed against CD30. The small molecule, MMAE, is a microtubule-disrupting agent. MMAE is covalently attached to the antibody via a linker. Nonclinical data suggest that the anticancer activity of ADCETRIS is due to the binding of the ADC to CD30-expressing cells, followed by internalization of the ADC‑CD30 complex, and the release of MMAE via proteolytic cleavage."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states this CD30-directed antibody-drug conjugate (chimeric IgG1 against CD30) binds CD30-expressing cells and is internalized as the ADC-CD30 complex, delivering MMAE that induces apoptosis; the directed, internalizing antibody depletes CD30-bearing cells -> decreased abundance. CD30 is encoded by the HGNC gene TNFRSF8 (HGNC:11923)."
    needs_review: false
    candidates: []
