biologic:
  name: belimumab
  id: NCIT:C91385
  matched_label: Belimumab
  synonyms: [Benlysta]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: systemic lupus erythematosus, id: MONDO:0007915, matched_label: systemic lupus erythematosus}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:2fa3c528-1777-4628-8a55-a69dae2381a3
        snippet: "Active systemic lupus erythematosus (SLE) who are receiving standard therapy"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names active systemic lupus erythematosus as an approved treatment population, asserting the drug→disease edge on an existing active condition."
      - reference: PMID:42308962
        reference_title: "Efficacy and safety of belimumab and anifrolumab in systemic lupus erythematosus: A systematic review and network meta-analysis."
        snippet: "Both biologics were associated with higher odds of achieving an SRI-4 response than placebo: anifrolumab OR 1.78 (95% CI 1.41-2.24); belimumab OR 1.62 (95% CI 1.38-1.90), with no significant difference between active treatments."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Network meta-analysis of randomized controlled trials showing belimumab significantly increased the odds of an SRI-4 response versus placebo in SLE, corroborating the indication."
    needs_review: false
  - predicate: biolink:ameliorates_condition
    object: {name: lupus nephritis, id: MONDO:0005556, matched_label: lupus nephritis}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:2fa3c528-1777-4628-8a55-a69dae2381a3
        snippet: "Active lupus nephritis who are receiving standard therapy."
        supports: SUPPORT
