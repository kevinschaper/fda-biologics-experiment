    needs_review: false
targets:
  - predicate: biolink:affects
    object: {name: BLyS, id: HGNC:11929, matched_label: TNFSF13B}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: activity
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:2fa3c528-1777-4628-8a55-a69dae2381a3
        snippet: "BENLYSTA is a BLyS-specific inhibitor that blocks the binding of soluble BLyS, a B-cell survival factor, to its receptors on B cells."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states belimumab is a BLyS-specific inhibitor that blocks BLyS binding to its receptors, i.e. causes decreased BLyS activity. BLyS (B-lymphocyte stimulator / BAFF) is encoded by TNFSF13B (HGNC:11929)."
    needs_review: false
