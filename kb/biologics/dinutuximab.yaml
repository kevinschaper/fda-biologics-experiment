biologic:
  name: dinutuximab
  id: NCIT:C1570
  matched_label: Dinutuximab
  synonyms: [Unituxin]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: neuroblastoma, id: MONDO:0005072, matched_label: neuroblastoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:d66bdf0d-9d65-45de-ae5b-a58617c27492
        snippet: "Unituxin (dinutuximab) is indicated, in combination with granulocyte-macrophage colony-stimulating factor (GM-CSF), interleukin-2 (IL-2), and 13-cis-retinoic acid (RA), for the treatment of pediatric patients with high-risk neuroblastoma who achieve at least a partial response to prior first-line multiagent, multimodality therapy"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names high-risk neuroblastoma in pediatric patients as the approved treatment population (in combination with GM-CSF, IL-2, and 13-cis-retinoic acid); stripping the high-risk qualifier leaves neuroblastoma, which grounds to MONDO:0005072."
      - reference: PMID:20879881
        reference_title: "Anti-GD2 antibody with GM-CSF, interleukin-2, and isotretinoin for neuroblastoma."
        snippet: "Immunotherapy with ch14.18, GM-CSF, and interleukin-2 was associated with a significantly improved outcome as compared with standard therapy in patients with high-risk neuroblastoma."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal Children's Oncology Group phase 3 randomized trial (ch14.18 = dinutuximab) demonstrating significantly improved event-free and overall survival versus standard therapy in high-risk neuroblastoma, corroborating the approved indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: GD2 ganglioside}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:d66bdf0d-9d65-45de-ae5b-a58617c27492
        snippet: "Dinutuximab binds to the glycolipid GD2."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states dinutuximab binds the glycolipid GD2 on GD2-expressing cells and induces their lysis via ADCC and CDC, depleting GD2-bearing cells -> decreased abundance. GD2 is a disialoganglioside (a glycolipid), not a human gene product, so it has no HGNC id; flagged needs_review with no candidates."
    needs_review: true
    candidates: []
