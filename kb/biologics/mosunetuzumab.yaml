biologic:
  name: mosunetuzumab
  id: NCIT:C129691
  matched_label: Mosunetuzumab
  synonyms: [Lunsumio]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: follicular lymphoma, id: MONDO:0018906, matched_label: follicular lymphoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:2ef0cf38-101c-4681-98fe-c05dc9ead443
        snippet: "LUNSUMIO is a bispecific CD20-directed CD3 T-cell engager indicated for the treatment of adult patients with relapsed or refractory follicular lymphoma after two or more lines of systemic therapy."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names relapsed or refractory follicular lymphoma as an approved treatment population, asserting the drug→disease edge. Follicular lymphoma grounds exactly to MONDO:0018906."
      - reference: PMID:35803286
        reference_title: "Safety and efficacy of mosunetuzumab, a bispecific antibody, in patients with relapsed or refractory follicular lymphoma: a single-arm, multicentre, phase 2 study."
        snippet: "Fixed-duration mosunetuzumab has a favourable safety profile and induces high rates of complete remissions, allowing potential administration as an outpatient regimen, in patients with relapsed or refractory follicular lymphoma and two or more previous therapies."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal single-arm phase 2 study demonstrating high complete-response rates with mosunetuzumab in relapsed or refractory follicular lymphoma after two or more prior therapies, corroborating the indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: CD20, id: HGNC:7315, matched_label: MS4A1}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:2ef0cf38-101c-4681-98fe-c05dc9ead443
        snippet: "Mosunetuzumab-axgb is a T-cell engaging bispecific antibody that binds to the CD3 receptor expressed on the surface of T-cells and CD20 expressed on the surface of lymphoma cells and some healthy B-lineage cells. In vitro, mosunetuzumab-axgb activated T-cells, caused the release of proinflammatory cytokines, and induced lysis of B-cells."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MoA states mosunetuzumab is a CD20/CD3 T-cell engager that binds CD20 on lymphoma cells and induces T-cell-mediated lysis of B-cells, depleting the CD20-bearing tumor-antigen population → decreased abundance of CD20. CD20 is the prior symbol for the HGNC gene MS4A1 (HGNC:7315)."
    needs_review: false
    candidates: []
