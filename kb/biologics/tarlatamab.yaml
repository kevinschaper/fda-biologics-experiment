biologic:
  name: tarlatamab
  id: NCIT:C175858
  matched_label: Tarlatamab
  synonyms: [Imdelltra]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: small cell lung cancer, id: MONDO:0008433, matched_label: small cell lung carcinoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:1e7b6163-5d83-42ea-82c9-cf7620cdc782
        snippet: "IMDELLTRA is indicated for the treatment of adult patients with extensive stage small cell lung cancer (ES-SCLC) with disease progression on or after platinum-based chemotherapy."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names extensive stage small cell lung cancer as an approved treatment population; stripping the stage qualifier leaves small cell lung cancer, which grounds to MONDO:0008433 (small cell lung carcinoma, an exact synonym)."
      - reference: PMID:37861218
        reference_title: "Tarlatamab for Patients with Previously Treated Small-Cell Lung Cancer."
        snippet: "Tarlatamab, administered as a 10-mg dose every 2 weeks, showed antitumor activity with durable objective responses and promising survival outcomes in patients with previously treated small-cell lung cancer."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 2 trial (DeLLphi-301) demonstrating that tarlatamab produces durable antitumor responses and promising survival in previously treated small cell lung cancer, corroborating the indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: DLL3, id: HGNC:2909, matched_label: DLL3}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:1e7b6163-5d83-42ea-82c9-cf7620cdc782
        snippet: "Tarlatamab-dlle is a bispecific T-cell engager that binds to DLL3 expressed on the surface of cells, including tumor cells, and CD3 expressed on the surface of T cells. Tarlatamab-dlle causes T-cell activation, release of inflammatory cytokines, and lysis of DLL3-expressing cells."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states tarlatamab is a DLL3-directed CD3 T-cell engager that binds DLL3 on tumor cells and redirects T-cells to lyse DLL3-expressing cells, depleting them → decreased abundance. DLL3 is the tumor antigen and is the HGNC gene symbol (HGNC:2909)."
    needs_review: false
    candidates: []
