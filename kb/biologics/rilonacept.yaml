        snippet: "Treatment of Cryopyrin-Associated Periodic Syndromes (CAPS), including Familial Cold Autoinflammatory Syndrome (FCAS), and Muckle-Wells Syndrome (MWS) in adults and children 12 years and older"
        supports: SUPPORT
        evidence_source: REGULATORY
