indications:
  - predicate: biolink:ameliorates_condition
    object: {name: recurrent pericarditis, id: MONDO:0005904, matched_label: pericarditis}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:ad965f38-dd22-4607-a673-2fb92f3b527a
        snippet: "Treatment of recurrent pericarditis (RP) and reduction in risk of recurrence in adults and children 12 years and older"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names recurrent pericarditis (RP) as an approved treatment indication; the 'recurrent' qualifier is stripped for grounding to pericarditis (MONDO:0005904)."
      - reference: PMID:33200890
        reference_title: "Phase 3 Trial of Interleukin-1 Trap Rilonacept in Recurrent Pericarditis."
        snippet: "Among patients with recurrent pericarditis, rilonacept led to rapid resolution of recurrent pericarditis episodes and to a significantly lower risk of pericarditis recurrence than placebo."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RHAPSODY randomized trial demonstrating rilonacept resolves recurrences and lowers recurrence risk in recurrent pericarditis, corroborating the approved indication."
    needs_review: false
