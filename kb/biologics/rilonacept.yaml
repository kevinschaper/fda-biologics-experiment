targets:
  - predicate: biolink:affects
    object: {name: IL-1β, id: HGNC:5992, matched_label: IL1B}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: activity
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:ad965f38-dd22-4607-a673-2fb92f3b527a
        snippet: "Rilonacept blocks IL-1 signaling by acting as a soluble decoy receptor that binds both IL-1α and IL-1β and prevents its interaction with cell surface receptors."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states rilonacept is an IL-1 trap that binds IL-1β and prevents its interaction with cell surface receptors, i.e. causes decreased IL-1β activity. IL-1β is encoded by IL1B (HGNC:5992)."
    needs_review: false
    candidates: []
