biologic:
  name: elranatamab
  id: NCIT:C146860
  matched_label: Elranatamab
  synonyms: [Elrexfio]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: multiple myeloma, id: MONDO:0009693, matched_label: plasma cell myeloma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:aa044060-5b4b-4692-bf0f-9a50e140b10e
        snippet: "ELREXFIO is indicated for the treatment of adult patients with relapsed or refractory multiple myeloma who have received at least four prior lines of therapy, including a proteasome inhibitor, an immunomodulatory agent, and an anti-CD38 monoclonal antibody."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names relapsed or refractory multiple myeloma as an approved treatment population, asserting the drug→disease edge. Multiple myeloma grounds to MONDO:0009693 (plasma cell myeloma, an exact synonym)."
      - reference: PMID:37582952
        reference_title: "Elranatamab in relapsed or refractory multiple myeloma: phase 2 MagnetisMM-3 trial results."
        snippet: "The primary endpoint of confirmed objective response rate (ORR) by blinded independent central review was met with an ORR of 61.0% (75/123)"
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 2 trial (MagnetisMM-3) met its primary endpoint with a 61.0% objective response rate in BCMA-naive relapsed or refractory multiple myeloma, corroborating the indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: BCMA, id: HGNC:11913, matched_label: TNFRSF17}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:aa044060-5b4b-4692-bf0f-9a50e140b10e
        snippet: "Elranatamab-bcmm is a bispecific B-cell maturation antigen (BCMA)-directed T-cell engaging antibody that binds BCMA on plasma cells, plasmablasts, and multiple myeloma cells and CD3 on T-cells leading to cytolysis of the BCMA-expressing cells."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states elranatamab is a BCMA-directed CD3 T-cell engager that binds BCMA on multiple myeloma cells and redirects T-cells to cause cytolysis of the BCMA-expressing cells, depleting them → decreased abundance. BCMA is the tumor antigen, encoded by the HGNC gene TNFRSF17 (HGNC:11913)."
    needs_review: false
    candidates: []
