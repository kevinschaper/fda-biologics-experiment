biologic:
  name: efgartigimod
  id: NCIT:C171817
  matched_label: Efgartigimod Alfa
  synonyms: [Vyvgart, efgartigimod alfa, efgartigimod alfa-fcab]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: generalized myasthenia gravis, id: MONDO:0009688, matched_label: myasthenia gravis}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:8aefc8e3-26d6-4ff6-aab9-a7542927e084
        snippet: "VYVGART is indicated for the treatment of adult patients with generalized myasthenia gravis (gMG)."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names generalized myasthenia gravis (gMG) as the approved treatment population; the severity qualifier 'generalized' is stripped for grounding to myasthenia gravis (MONDO:0009688)."
      - reference: PMID:34146511
        reference_title: "Safety, efficacy, and tolerability of efgartigimod in patients with generalised myasthenia gravis (ADAPT): a multicentre, randomised, placebo-controlled, phase 3 trial."
        snippet: "Efgartigimod was well tolerated and efficacious in patients with generalised myasthenia gravis."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 ADAPT randomized placebo-controlled trial demonstrating efficacy of efgartigimod in generalized myasthenia gravis, corroborating the approved indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: FcRn, id: HGNC:3621, matched_label: FCGRT}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: activity
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:8aefc8e3-26d6-4ff6-aab9-a7542927e084
        snippet: "Efgartigimod alfa-fcab is a human IgG1 antibody fragment that binds to the neonatal Fc receptor (FcRn), resulting in the reduction of circulating IgG."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states efgartigimod binds FcRn and reduces circulating IgG; blocking FcRn-mediated IgG recycling decreases FcRn functional activity. FcRn is encoded by FCGRT (HGNC:3621)."
    needs_review: false
    candidates: []
