biologic:
  name: blinatumomab
  id: NCIT:C62528
  matched_label: Blinatumomab
  synonyms: [Blincyto]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: B-cell precursor acute lymphoblastic leukemia, id: MONDO:0004947, matched_label: B-cell acute lymphoblastic leukemia}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:38b482a8-960b-4591-9857-5031ecb830aa
        snippet: "BLINCYTO is indicated for the treatment of relapsed or refractory CD19-positive B-cell precursor acute lymphoblastic leukemia (ALL) in adult and pediatric patients one month and older."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names relapsed or refractory CD19-positive B-cell precursor acute lymphoblastic leukemia as an approved treatment population, asserting the drug→disease edge. The B-cell precursor subtype qualifier is stripped for grounding to B-cell acute lymphoblastic leukemia (MONDO:0004947)."
      - reference: PMID:28249141
        reference_title: "Blinatumomab versus Chemotherapy for Advanced Acute Lymphoblastic Leukemia."
        snippet: "Treatment with blinatumomab resulted in significantly longer overall survival than chemotherapy among adult patients with relapsed or refractory B-cell precursor ALL."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCT (TOWER) demonstrating blinatumomab significantly prolongs overall survival versus standard chemotherapy in relapsed or refractory B-cell precursor ALL, corroborating the indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: CD19, id: HGNC:1633, matched_label: CD19}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:38b482a8-960b-4591-9857-5031ecb830aa
        snippet: "Blinatumomab is a bispecific CD19-directed CD3 T-cell engager that binds to CD19 expressed on the surface of cells of B-lineage origin and CD3 expressed on the surface of T-cells. It activates endogenous T-cells by connecting CD3 in the T-cell receptor (TCR) complex with CD19 on benign and malignant B-cells. Blinatumomab mediates the formation of a synapse between the T-cell and the tumor cell, upregulation of cell adhesion molecules, production of cytolytic proteins, release of inflammatory cytokines, and proliferation of T-cells, which result in redirected lysis of CD19+ cells."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MoA states blinatumomab is a CD19-directed T-cell engager that binds CD19 on B-cells and redirects T-cell lysis of CD19+ cells, depleting the CD19-bearing tumor-antigen population → decreased abundance of CD19. CD19 is the HGNC gene symbol (HGNC:1633)."
    needs_review: false
    candidates: []
