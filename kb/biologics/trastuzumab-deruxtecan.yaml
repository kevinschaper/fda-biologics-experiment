biologic:
  name: fam-trastuzumab deruxtecan-nxki
  id: NCIT:C128799
  matched_label: Trastuzumab Deruxtecan
  synonyms: [Enhertu]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: breast cancer, id: MONDO:0007254, matched_label: breast cancer}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:7e67e73e-ddf4-4e4d-8b50-09d7514910b6
        snippet: "as monotherapy for the treatment of adult patients with unresectable or metastatic HER2-positive (IHC 3+ or ISH+) breast cancer who have received a prior anti-HER2-based regimen either in the metastatic setting, or, in the neoadjuvant or adjuvant setting and have developed disease recurrence during or within six months of completing therapy."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names unresectable or metastatic HER2-positive breast cancer as an approved (monotherapy) treatment population; stripping the HER2/stage qualifiers leaves breast cancer, which grounds to MONDO:0007254."
      - reference: PMID:35320644
        reference_title: "Trastuzumab Deruxtecan versus Trastuzumab Emtansine for Breast Cancer."
        snippet: "Among patients with HER2-positive metastatic breast cancer previously treated with trastuzumab and a taxane, the risk of disease progression or death was lower among those who received trastuzumab deruxtecan than among those who received trastuzumab emtansine."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCT (DESTINY-Breast03) showing trastuzumab deruxtecan lowers the risk of disease progression or death versus trastuzumab emtansine in HER2-positive metastatic breast cancer, corroborating the indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: HER2, id: HGNC:3430, matched_label: ERBB2}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:7e67e73e-ddf4-4e4d-8b50-09d7514910b6
        snippet: "Fam-trastuzumab deruxtecan-nxki is a HER2-directed antibody-drug conjugate. The antibody is a humanized anti-HER2 IgG1. The small molecule, DXd, is a topoisomerase I inhibitor attached to the antibody by a cleavable linker. Following binding to HER2 on tumor cells, fam-trastuzumab deruxtecan-nxki undergoes internalization and intracellular linker cleavage by lysosomal enzymes."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states this HER2-directed antibody-drug conjugate binds HER2 on tumor cells and is internalized, delivering DXd that causes DNA damage and apoptosis; the directed, internalizing antibody depletes HER2-bearing cells -> decreased abundance. HER2 is encoded by the HGNC gene ERBB2 (HGNC:3430)."
    needs_review: false
    candidates: []
