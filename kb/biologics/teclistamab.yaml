biologic:
  name: teclistamab
  id: NCIT:C136823
  matched_label: Teclistamab
  synonyms: [Tecvayli]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: multiple myeloma, id: MONDO:0009693, matched_label: plasma cell myeloma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:54e0f974-ccee-44ea-9254-40e9883cee1e
        snippet: "TECVAYLI is indicated for the treatment of adult patients with relapsed or refractory multiple myeloma"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names relapsed or refractory multiple myeloma as an approved treatment population, asserting the drug→disease edge. Multiple myeloma grounds to MONDO:0009693 (plasma cell myeloma, an exact synonym)."
      - reference: PMID:35661166
        reference_title: "Teclistamab in Relapsed or Refractory Multiple Myeloma."
        snippet: "Teclistamab resulted in a high rate of deep and durable response in patients with triple-class-exposed relapsed or refractory multiple myeloma."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 1-2 trial (MajesTEC-1) demonstrating that teclistamab produces deep, durable responses in triple-class-exposed relapsed or refractory multiple myeloma, corroborating the indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: BCMA, id: HGNC:11913, matched_label: TNFRSF17}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:54e0f974-ccee-44ea-9254-40e9883cee1e
        snippet: "binds to the CD3 receptor expressed on the surface of T-cells and B-cell maturation antigen (BCMA) expressed on the surface of multiple myeloma cells and some healthy B-lineage cells."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states teclistamab is a BCMA-directed CD3 T-cell engager that binds BCMA on multiple myeloma cells and redirects T-cells to lyse them, depleting BCMA-bearing cells → decreased abundance. BCMA is the tumor antigen, encoded by the HGNC gene TNFRSF17 (HGNC:11913)."
    needs_review: false
    candidates: []
