biologic:
  name: obinutuzumab
  id: NCIT:C70741
  matched_label: Obinutuzumab
  synonyms: [Gazyva]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: chronic lymphocytic leukemia, id: MONDO:0004948, matched_label: B-cell chronic lymphocytic leukemia}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:df12ceb2-5b4b-4ab5-a317-2a36bf2a3cda
        snippet: "in combination with chlorambucil, for the treatment of patients with previously untreated chronic lymphocytic leukemia (CLL)."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names previously untreated chronic lymphocytic leukemia as an approved treatment population, asserting the drug→disease edge. CLL grounds to B-cell chronic lymphocytic leukemia (MONDO:0004948)."
      - reference: PMID:24401022
        reference_title: "Obinutuzumab plus chlorambucil in patients with CLL and coexisting conditions."
        snippet: "Combining an anti-CD20 antibody with chemotherapy improved outcomes in patients with CLL and coexisting conditions. In this patient population, obinutuzumab was superior to rituximab when each was combined with chlorambucil."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCT (CLL11) demonstrating obinutuzumab plus chlorambucil improves outcomes in previously untreated CLL, corroborating the indication."
    needs_review: false
  - predicate: biolink:ameliorates_condition
    object: {name: follicular lymphoma, id: MONDO:0018906, matched_label: follicular lymphoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:df12ceb2-5b4b-4ab5-a317-2a36bf2a3cda
        snippet: "for the treatment of patients with follicular lymphoma (FL)who relapsed after, or are refractory to, a rituximab-containing regimen."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names follicular lymphoma (relapsed/refractory after a rituximab-containing regimen) as an approved treatment population, asserting the drug→disease edge."
    needs_review: false
targets:
