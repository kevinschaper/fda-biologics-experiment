    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:df12ceb2-5b4b-4ab5-a317-2a36bf2a3cda
        snippet: "Obinutuzumab is a monoclonal antibody that targets the CD20 antigen expressed on the surface of pre-B and mature B lymphocytes. Upon binding to CD20, obinutuzumab mediates B-cell lysis through"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MoA states obinutuzumab is a CD20-directed cytolytic antibody that binds CD20 and mediates B-cell lysis, depleting CD20-bearing B cells → decreased abundance. CD20 is the prior symbol for the HGNC gene MS4A1."
