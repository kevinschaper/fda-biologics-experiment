biologic:
  name: belantamab mafodotin
  id: NCIT:C114299
  matched_label: Belantamab Mafodotin
  synonyms: [Blenrep]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: multiple myeloma, id: MONDO:0009693, matched_label: plasma cell myeloma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:aef7c34c-fef8-407c-99c0-a68aded53c60
        snippet: "BLENREP is indicated in combination with bortezomib and dexamethasone for the treatment of adult patients with relapsed or refractory multiple myeloma who have received at least two prior lines of therapy, including a proteasome inhibitor and an immunomodulatory agent."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names relapsed or refractory multiple myeloma as an approved treatment population (here in combination with bortezomib and dexamethasone), asserting the drug→disease edge. Multiple myeloma grounds to MONDO:0009693 (plasma cell myeloma, an exact synonym)."
      - reference: PMID:38828933
        reference_title: "Belantamab Mafodotin, Bortezomib, and Dexamethasone for Multiple Myeloma."
        snippet: "As compared with DVd therapy, BVd therapy conferred a significant benefit with respect to progression-free survival among patients who had relapsed or refractory multiple myeloma after at least one line of therapy."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCT (DREAMM-7) demonstrating that belantamab mafodotin with bortezomib and dexamethasone significantly improves progression-free survival versus daratumumab/bortezomib/dexamethasone in relapsed or refractory multiple myeloma, corroborating the indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: BCMA, id: HGNC:11913, matched_label: TNFRSF17}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:aef7c34c-fef8-407c-99c0-a68aded53c60
        snippet: "Upon binding to BCMA, belantamab mafodotin‑blmf is internalized followed by release of the cytotoxic agent (cys‑mcMMAF) via proteolytic cleavage."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION describes belantamab mafodotin as a BCMA-directed antibody-drug conjugate that, upon binding BCMA on multiple myeloma cells, is internalized and releases cytotoxic cys-mcMMAF causing apoptosis; this internalizing, directed ADC depletes BCMA-bearing cells → decreased abundance. BCMA is the tumor antigen, encoded by the HGNC gene TNFRSF17 (HGNC:11913)."
    needs_review: false
    candidates: []
