      - reference: PMID:35235726
        reference_title: "Nirsevimab for Prevention of RSV in Healthy Late-Preterm and Term Infants."
        snippet: "Medically attended RSV-associated lower respiratory tract infection occurred in 12 infants (1.2%) in the nirsevimab group and in 25 infants (5.0%) in the placebo group; these findings correspond to an efficacy of 74.5%"
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 MELODY randomized, placebo-controlled trial showing a single dose of nirsevimab reduced medically attended RSV-associated lower respiratory tract infection by 74.5% in healthy late-preterm and term infants, corroborating the prevention indication."
