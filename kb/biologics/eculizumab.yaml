    evidence:
      - reference: FDA:ebcd67fa-b4d1-4a22-b33d-ee8bf6b9c722
        snippet: "Eculizumab, the active ingredient in SOLIRIS, is a monoclonal antibody that specifically binds to the complement protein C5 with high affinity, thereby inhibiting its cleavage to C5a and C5b and preventing the generation of the terminal complement complex C5b-9."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MoA states eculizumab binds complement protein C5 and inhibits its cleavage, blocking terminal complement activation → decreased C5 activity."
