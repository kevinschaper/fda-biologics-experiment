    object: {name: Clostridioides difficile infection, id: MONDO:0000705, matched_label: Clostridium difficile colitis}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:8f479bfe-2bfa-4cc5-9aee-1357364480b0
        snippet: "ZINPLAVA™ is indicated to reduce recurrence of Clostridioides difficile infection (CDI) in adults and pediatric patients 1 year of age and older"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE states ZINPLAVA is indicated to reduce recurrence of Clostridioides difficile infection in patients receiving antibacterial CDI treatment; reducing recurrence is risk-reduction/prevention (the label notes it is not indicated for treatment of CDI), so preventative_for_condition. The disease grounds to MONDO:0000705 (Clostridium difficile colitis; 'Clostridium difficile infection' is a registered synonym)."
      - reference: PMID:28121498
        reference_title: "Bezlotoxumab for Prevention of Recurrent Clostridium difficile Infection."
        snippet: "In both trials, the rate of recurrent C. difficile infection was significantly lower with bezlotoxumab alone than with placebo"
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 MODIFY I and MODIFY II randomized, placebo-controlled trials showing bezlotoxumab significantly lowered the rate of recurrent C. difficile infection versus placebo, corroborating the reduce-recurrence indication."
