        snippet: "CRYSVITA is indicated for the treatment of X-linked hypophosphatemia (XLH) in adult and pediatric patients 6 months of age and older."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names X-linked hypophosphatemia (XLH) as an approved treatment indication; XLH grounds (synonym) to MONDO:0010619 (X-linked dominant hypophosphatemic rickets)."
      - reference: PMID:29791829
        reference_title: "Burosumab Therapy in Children with X-Linked Hypophosphatemia."
        snippet: "In children with X-linked hypophosphatemia, treatment with burosumab improved renal tubular phosphate reabsorption, serum phosphorus levels, linear growth, and physical function and reduced pain and the severity of rickets."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 RCT demonstrating burosumab improves phosphate reabsorption, serum phosphorus, growth and rickets severity in children with X-linked hypophosphatemia, corroborating the indication."
