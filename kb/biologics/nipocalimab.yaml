biologic:
  name: nipocalimab
  id: NCIT:C170891
  matched_label: Nipocalimab
  synonyms: [Imaavy, nipocalimab-aahu]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: generalized myasthenia gravis, id: MONDO:0009688, matched_label: myasthenia gravis}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:8886274c-f2b2-48af-85c1-2f90bfe304b8
        snippet: "IMAAVY is indicated for the treatment of generalized myasthenia gravis (gMG) in adult and pediatric patients 12 years of age and older who are anti-acetylcholine receptor (AChR) or anti-muscle-specific tyrosine kinase (MuSK) antibody positive."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names generalized myasthenia gravis (gMG) as the approved treatment population; the severity qualifier 'generalized' is stripped for grounding to myasthenia gravis (MONDO:0009688)."
      - reference: PMID:42157574
        reference_title: "Evaluation of Sustained Disease Control With Nipocalimab Versus Placebo in the Phase 3 Vivacity-MG3 Study."
        snippet: "Nipocalimab treatment improves gMG symptoms earlier than placebo and provides meaningful and long-term sustained disease control over 24 weeks among participants with gMG."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Phase 3 Vivacity-MG3 randomized placebo-controlled study demonstrating nipocalimab improves and sustains disease control in generalized myasthenia gravis, corroborating the approved indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: FcRn, id: HGNC:3621, matched_label: FCGRT}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: activity
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:8886274c-f2b2-48af-85c1-2f90bfe304b8
        snippet: "Nipocalimab-aahu is a human IgG1 monoclonal antibody that binds to neonatal Fc receptor (FcRn), resulting in the reduction of circulating IgG levels."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states nipocalimab binds FcRn and reduces circulating IgG levels; blocking FcRn-mediated IgG recycling decreases FcRn functional activity. FcRn is encoded by FCGRT (HGNC:3621)."
    needs_review: false
    candidates: []
