biologic:
  name: epcoritamab
  id: NCIT:C163022
  matched_label: Epcoritamab
  synonyms: [Epkinly]
indications:
  - predicate: biolink:ameliorates_condition
    object: {name: diffuse large B-cell lymphoma, id: MONDO:0018905, matched_label: diffuse large B-cell lymphoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:d7836711-b677-412d-bf2d-0f7c8444103a
        snippet: "EPKINLY is indicated for the treatment of adult patients with relapsed or refractory diffuse large B-cell lymphoma (DLBCL), not otherwise specified, including DLBCL arising from indolent lymphoma, and high-grade B-cell lymphoma after two or more lines of systemic therapy."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names relapsed or refractory diffuse large B-cell lymphoma as an approved treatment population, asserting the drug→disease edge. DLBCL grounds exactly to MONDO:0018905."
      - reference: PMID:36548927
        reference_title: "Epcoritamab, a Novel, Subcutaneous CD3xCD20 Bispecific T-Cell-Engaging Antibody, in Relapsed or Refractory Large B-Cell Lymphoma: Dose Expansion in a Phase I/II Trial."
        snippet: "Subcutaneous epcoritamab resulted in deep and durable responses and manageable safety in highly refractory patients with large B-cell lymphoma, including those with prior CAR T-cell exposure."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase I/II dose-expansion trial (EPCORE NHL-1) demonstrating deep and durable responses with epcoritamab in relapsed or refractory large B-cell lymphoma, corroborating the DLBCL indication."
    needs_review: false
    candidates: []
  - predicate: biolink:ameliorates_condition
    object: {name: follicular lymphoma, id: MONDO:0018906, matched_label: follicular lymphoma}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:d7836711-b677-412d-bf2d-0f7c8444103a
        snippet: "In combination with lenalidomide and rituximab for the treatment of adult patients with relapsed or refractory follicular lymphoma (FL)."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names relapsed or refractory follicular lymphoma as an approved treatment population (in combination with lenalidomide and rituximab), asserting the drug→disease edge. Follicular lymphoma grounds exactly to MONDO:0018906."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: CD20, id: HGNC:7315, matched_label: MS4A1}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: abundance
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:d7836711-b677-412d-bf2d-0f7c8444103a
        snippet: "Epcoritamab-bysp is a T-cell engaging bispecific antibody that binds to the CD3 receptor expressed on the surface of T-cells and CD20 expressed on the surface of lymphoma cells and healthy B-lineage cells. In vitro, epcoritamab-bysp activated T-cells, caused the release of proinflammatory cytokines, and induced lysis of B-cells."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MoA states epcoritamab is a CD20/CD3 T-cell engager that binds CD20 on lymphoma cells and induces T-cell-mediated lysis of B-cells, depleting the CD20-bearing tumor-antigen population → decreased abundance of CD20. CD20 is the prior symbol for the HGNC gene MS4A1 (HGNC:7315)."
    needs_review: false
    candidates: []
