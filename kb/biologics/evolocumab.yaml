    object: {name: homozygous familial hypercholesterolemia, id: MONDO:0018328, matched_label: homozygous familial hypercholesterolemia}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:cd61e902-166d-4aa6-9f3c-a18c1008d07e
        snippet: "adults and pediatric patients aged 10 years and older with homozygous familial hypercholesterolemia (HoFH)."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names homozygous familial hypercholesterolemia (HoFH) as an approved treatment population (adjunct to diet/exercise to reduce LDL-C), asserting the drug->disease edge."
      - reference: PMID:25282520
        reference_title: "Inhibition of PCSK9 with evolocumab in homozygous familial hypercholesterolaemia (TESLA Part B): a randomised, double-blind, placebo-controlled trial."
        snippet: "In patients with homozygous familial hypercholesterolaemia receiving stable background lipid-lowering treatment and not on apheresis, evolocumab 420 mg administered every 4 weeks was well tolerated and significantly reduced LDL cholesterol compared with placebo."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal randomized, double-blind, placebo-controlled trial (TESLA Part B) demonstrating evolocumab significantly reduces LDL cholesterol in patients with homozygous familial hypercholesterolemia, corroborating the indication."
    needs_review: false
