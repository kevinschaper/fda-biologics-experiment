    needs_review: false
targets:
  - predicate: biolink:affects
    object: {name: integrin alpha4beta7, id: HGNC:6162, matched_label: ITGB7}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: activity
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:6e94621c-1a95-4af9-98d1-52b9e6f1949c
        snippet: "specifically binds to the α4β7 integrin and blocks the interaction of α4β7 integrin with mucosal addressin cell adhesion molecule-1 (MAdCAM-1)"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MoA states vedolizumab binds and antagonizes the α4β7 integrin, i.e. causes decreased α4β7 activity. The α4β7 integrin is a heterodimer (ITGA4 + ITGB7) with no single HGNC gene; grounded to the gut-selective β7 subunit ITGB7 (HGNC:6162) as the most representative gene and flagged for review."
    needs_review: true
    candidates:
