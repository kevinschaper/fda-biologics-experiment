    object: {name: ulcerative colitis, id: MONDO:0005101, matched_label: ulcerative colitis}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:6e94621c-1a95-4af9-98d1-52b9e6f1949c
        snippet: "moderately to severely active ulcerative colitis (UC)"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE names moderately to severely active ulcerative colitis as an approved treatment population, asserting the drug→disease edge."
      - reference: PMID:23964932
        reference_title: "Vedolizumab as induction and maintenance therapy for ulcerative colitis."
        snippet: "Response rates at week 6 were 47.1% and 25.5% among patients in the vedolizumab group and placebo group, respectively"
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal RCT (GEMINI 1) showing vedolizumab improves response rates in ulcerative colitis, corroborating the indication."
    needs_review: false
  - predicate: biolink:ameliorates_condition
