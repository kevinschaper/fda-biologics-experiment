biologic:
  name: basiliximab
  id: NCIT:C52186
  matched_label: Basiliximab
  synonyms: [Simulect]
indications:
  - predicate: biolink:preventative_for_condition
    object: {name: organ transplant rejection, id: MONDO:1010185, matched_label: transplant rejection}
    label_section: INDICATIONS AND USAGE
    evidence:
      - reference: FDA:1af01887-b69d-444b-91ed-ebfe12784440
        snippet: "Simulect ® (basiliximab) is indicated for the prophylaxis of acute organ rejection in patients receiving renal transplantation"
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "INDICATIONS AND USAGE states Simulect is indicated for the prophylaxis of acute organ rejection in renal transplant recipients; prophylaxis is prevention/risk-reduction, so preventative_for_condition. The disease (acute organ/transplant rejection) grounds to transplant rejection (MONDO:1010185)."
      - reference: PMID:9652559
        reference_title: "Randomised trial of basiliximab versus placebo for control of acute cellular rejection in renal allograft recipients. CHIB 201 International Study Group."
        snippet: "Prophylaxis with 40 mg basiliximab reduces the incidence of acute rejection episodes significantly, with no clinically relevant safety or tolerability concerns."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        explanation: "Pivotal phase 3 double-blind RCT showing basiliximab prophylaxis significantly reduces the incidence of acute cellular rejection in renal allograft recipients, corroborating the prophylaxis-of-rejection indication."
    needs_review: false
    candidates: []
targets:
  - predicate: biolink:affects
    object: {name: IL-2 receptor alpha chain (CD25), id: HGNC:6008, matched_label: IL2RA}
    qualified_predicate: biolink:causes
    object_aspect_qualifier: activity
    object_direction_qualifier: decreased
    label_section: MECHANISM OF ACTION
    evidence:
      - reference: FDA:1af01887-b69d-444b-91ed-ebfe12784440
        snippet: "Basiliximab is specifically targeted against IL-2Rα, which is selectively expressed on the surface of activated T-lymphocytes."
        supports: SUPPORT
        evidence_source: REGULATORY
        explanation: "MECHANISM OF ACTION states basiliximab is an IL-2 receptor antagonist specifically targeted against IL-2Rα (CD25), the alpha chain of the high-affinity IL-2 receptor, blocking IL-2 binding → decreased IL-2Rα-mediated activity. IL-2Rα grounds to the HGNC gene IL2RA."
    needs_review: false
    candidates: []
